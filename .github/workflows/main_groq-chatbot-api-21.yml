name: Build and deploy Python app to Azure Web App - groq-chatbot-api-21

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create deployment package
        run: |
          mkdir release
          cp -r backend release/
          cp -r frontend release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F8D7F657C6BC4283B7F244F3C514D611 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_41A9004F60074020B842B2176084C20F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B683A52593A44CCC89F0925199831FA0 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'groq-chatbot-api-21'
          slot-name: 'Production'
          package: release
